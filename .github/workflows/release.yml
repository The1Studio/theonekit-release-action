name: TheOneKit Release
on:
  workflow_call:
    inputs:
      kit-name:
        description: 'Display name (e.g., "TheOneKit Unity")'
        required: true
        type: string
      zip-name:
        description: 'ZIP filename (e.g., "theonekit-unity.zip")'
        required: true
        type: string
      zip-includes:
        description: 'Space-separated paths to include in ZIP'
        required: false
        type: string
        default: '.claude/'
      modular:
        description: 'Enable module validation (set true for modular kits)'
        required: false
        type: boolean
        default: false
      modules-file:
        description: 'Path to t1k-modules.json (relative to repo root)'
        required: false
        type: string
        default: 't1k-modules.json'
      release-mode:
        description: 'Release mode: "semantic" (single ZIP via semantic-release) or "modules" (per-module ZIPs)'
        required: false
        type: string
        default: 'semantic'
      discord-thread-id:
        description: 'Discord thread ID for notifications (optional — skip Discord if empty)'
        required: false
        type: string
        default: ''
    secrets:
      discord-webhook-url:
        description: 'Discord webhook URL (optional — skip Discord if empty)'
        required: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: [self-hosted, arc, the1studio, org]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f "bun.lock" ] || [ -f "bunfig.toml" ]; then
            # Install bun if not available (self-hosted runners may not have it)
            if ! command -v bun &>/dev/null; then
              echo "Installing bun..."
              curl -fsSL https://bun.sh/install | bash
              # Persist bun PATH for all subsequent steps (not just this shell)
              echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
              export PATH="$HOME/.bun/bin:$PATH"
            fi
            bun install && bun run build 2>/dev/null || true
            # Build UI if script exists (for CLI projects with dashboard)
            bun run ui:build 2>/dev/null || true
          fi
          npm ci

      - name: Download release scripts
        run: |
          mkdir -p .release-scripts
          # Use GitHub API to avoid raw.githubusercontent.com caching
          for script in prepare-release-assets.cjs send-discord-release.cjs validate-modules.cjs generate-module-keywords.cjs flatten-module-files.cjs inject-origin-metadata.cjs generate-module-docs.cjs release-modules.cjs release-modules-helpers.cjs parse-commits.cjs compute-version-bump.cjs build-module-zip.cjs build-release-manifest.cjs generate-module-manifest.cjs create-github-release.cjs auto-prefix-agents.cjs validate-no-collisions.cjs; do
            curl -sL -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/The1Studio/theonekit-release-action/contents/scripts/$script?ref=main" \
              -o ".release-scripts/$script"
          done

      - name: Validate modules
        if: inputs.modular == true
        env:
          MODULES_FILE: ${{ inputs.modules-file }}
        run: node .release-scripts/validate-modules.cjs

      - name: Generate module keywords
        if: inputs.modular == true
        env:
          MODULES_FILE: ${{ inputs.modules-file }}
        run: node .release-scripts/generate-module-keywords.cjs

      - name: Inject origin metadata
        if: inputs.release-mode != 'modules'
        env:
          GITHUB_REPO: ${{ github.repository }}
          CORE_REPO: 'theonekit-core'
          MODULES_FILE: ${{ inputs.modular && inputs.modules-file || '' }}
        run: node .release-scripts/inject-origin-metadata.cjs

      - name: Commit metadata back to git
        if: inputs.release-mode != 'modules'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .claude/
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): update metadata [skip ci]"
            git push origin HEAD || (git pull --rebase origin HEAD && git push origin HEAD)
          fi

      - name: Generate module documentation
        if: inputs.modular == true && inputs.release-mode != 'modules'
        env:
          MODULES_FILE: ${{ inputs.modules-file }}
        run: node .release-scripts/generate-module-docs.cjs

      - name: Prepare release assets
        if: inputs.release-mode != 'modules'
        env:
          KIT_NAME: ${{ inputs.kit-name }}
          ZIP_NAME: ${{ inputs.zip-name }}
          ZIP_INCLUDES: ${{ inputs.zip-includes }}
          GITHUB_REPO: ${{ github.repository }}
          MODULES_FILE: ${{ inputs.modular && inputs.modules-file || '' }}
        run: node .release-scripts/prepare-release-assets.cjs

      - name: Install gh CLI
        if: inputs.release-mode == 'modules'
        run: |
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq && sudo apt-get install -y -qq gh
          fi

      - name: Module Release
        if: inputs.release-mode == 'modules'
        id: module-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIT_NAME: ${{ inputs.kit-name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          node .release-scripts/release-modules.cjs --kit-dir .
          echo "new_release=true" >> "$GITHUB_OUTPUT"

      - name: Semantic Release
        if: inputs.release-mode != 'modules'
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          output=$(npx semantic-release 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "Published release"; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            if echo "$output" | grep -q "ELIFECYCLE"; then
              echo "::error::Semantic release failed with fatal error"
              exit 1
            fi
          fi

      - name: Notify Discord
        if: (steps.release.outputs.new_release == 'true' || steps.module-release.outputs.new_release == 'true') && inputs.discord-thread-id != ''
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.discord-webhook-url }}
          DISCORD_THREAD_ID: ${{ inputs.discord-thread-id }}
          KIT_NAME: ${{ inputs.kit-name }}
          GITHUB_REPO: ${{ github.repository }}
          RELEASE_MODE: ${{ inputs.release-mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .release-scripts/send-discord-release.cjs

      - name: Cleanup
        if: always()
        run: rm -rf .release-scripts
