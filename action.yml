name: 'TheOneKit Release'
description: 'Semantic release with ZIP bundling, module validation, and Discord notifications for TheOneKit repos'
inputs:
  kit-name:
    description: 'Display name (e.g., "TheOneKit Unity")'
    required: true
  release-mode:
    description: 'Release mode: "semantic-release" (flat kits) or "modules" (modular kits)'
    required: false
    default: 'semantic-release'
  zip-name:
    description: 'ZIP filename for semantic-release mode (e.g., "theonekit-unity.zip")'
    required: false
  zip-includes:
    description: 'Space-separated paths to include in ZIP (semantic-release mode only)'
    required: false
    default: '.claude/'
  modules-validation:
    description: 'Enable module validation (true for modular kits)'
    required: false
    default: 'false'
  modules-file:
    description: 'Path to t1k-modules.json (relative to repo root)'
    required: false
    default: '.claude/t1k-modules.json'
  discord-thread-id:
    description: 'Discord thread ID for notifications'
    required: true
  github-token:
    description: 'GitHub token for releases'
    required: true
  discord-webhook-url:
    description: 'Discord webhook URL'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Validate modules
      if: inputs.modules-validation == 'true'
      shell: bash
      env:
        MODULES_FILE: ${{ inputs.modules-file }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/validate-modules.cjs

    - name: Generate module keywords
      if: inputs.modules-validation == 'true'
      shell: bash
      env:
        MODULES_FILE: ${{ inputs.modules-file }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/generate-module-keywords.cjs

    - name: Inject shared hook scripts
      if: inputs.modules-validation == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        mkdir -p .claude/scripts
        for script in generate-baseline-context.sh check-module-keywords.sh; do
          cp "${{ github.action_path }}/scripts/$script" ".claude/scripts/$script"
          chmod +x ".claude/scripts/$script"
        done
        echo "[inject] Hook scripts injected from release-action"

    - name: Inject origin metadata
      shell: bash
      env:
        GITHUB_REPO: ${{ github.repository }}
        CORE_REPO: 'theonekit-core'
        MODULES_FILE: ${{ inputs.modules-validation == 'true' && inputs.modules-file || '' }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/inject-origin-metadata.cjs

    - name: Commit metadata back to git
      if: inputs.release-mode != 'modules'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A .claude/
        if ! git diff --cached --quiet; then
          git commit -m "chore(ci): update metadata [skip ci]"
          git push origin HEAD || (git pull --rebase origin HEAD && git push origin HEAD)
        fi

    - name: Prepare release assets
      shell: bash
      env:
        KIT_NAME: ${{ inputs.kit-name }}
        ZIP_NAME: ${{ inputs.zip-name }}
        ZIP_INCLUDES: ${{ inputs.zip-includes }}
        GITHUB_REPO: ${{ github.repository }}
        MODULES_FILE: ${{ inputs.modules-validation == 'true' && inputs.modules-file || '' }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/prepare-release-assets.cjs

    - name: Semantic Release
      id: release
      if: inputs.release-mode != 'modules'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      working-directory: ${{ github.workspace }}
      run: |
        set +e
        npx semantic-release 2>&1 | tee /tmp/sr-output.txt
        SR_EXIT=$?
        set -e
        if grep -q "Published release" /tmp/sr-output.txt; then
          echo "new_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "new_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Module Release
      id: module-release
      if: inputs.release-mode == 'modules'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPO: ${{ github.repository }}
        KIT_NAME: ${{ inputs.kit-name }}
      working-directory: ${{ github.workspace }}
      run: |
        set +e
        node ${{ github.action_path }}/scripts/release-modules.cjs \
          --kit-dir "${{ github.workspace }}" 2>&1 | tee /tmp/mr-output.txt
        MR_EXIT=$?
        set -e
        # Only signal new_release if the script actually created a release (exit 0)
        # and didn't exit early with "No releasable commits"
        if [ $MR_EXIT -eq 0 ] && ! grep -q "No releasable commits" /tmp/mr-output.txt; then
          echo "new_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "new_release=false" >> "$GITHUB_OUTPUT"
          echo "[release] No new release created — skipping Discord notification"
        fi

    - name: Notify Discord
      if: >
        (inputs.release-mode != 'modules' && steps.release.outputs.new_release == 'true') ||
        (inputs.release-mode == 'modules' && steps.module-release.outputs.new_release == 'true')
      shell: bash
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.discord-webhook-url }}
        DISCORD_THREAD_ID: ${{ inputs.discord-thread-id }}
        KIT_NAME: ${{ inputs.kit-name }}
        GITHUB_REPO: ${{ github.repository }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/send-discord-release.cjs
