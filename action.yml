name: 'TheOneKit Release'
description: 'Semantic release with ZIP bundling and Discord notifications for TheOneKit repos'
inputs:
  kit-name:
    description: 'Display name (e.g., "TheOneKit Unity")'
    required: true
  zip-name:
    description: 'ZIP filename (e.g., "theonekit-unity.zip")'
    required: true
  zip-includes:
    description: 'Space-separated paths to include in ZIP'
    required: false
    default: '.claude/'
  discord-thread-id:
    description: 'Discord thread ID for notifications'
    required: true
  github-token:
    description: 'GitHub token for releases'
    required: true
  discord-webhook-url:
    description: 'Discord webhook URL'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Prepare release assets
      shell: bash
      env:
        KIT_NAME: ${{ inputs.kit-name }}
        ZIP_NAME: ${{ inputs.zip-name }}
        ZIP_INCLUDES: ${{ inputs.zip-includes }}
        GITHUB_REPO: ${{ github.repository }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/prepare-release-assets.cjs

    - name: Semantic Release
      id: release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      working-directory: ${{ github.workspace }}
      run: |
        output=$(npx semantic-release 2>&1)
        echo "$output"
        if echo "$output" | grep -q "Published release"; then
          echo "new_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "new_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Notify Discord
      if: steps.release.outputs.new_release == 'true'
      shell: bash
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.discord-webhook-url }}
        DISCORD_THREAD_ID: ${{ inputs.discord-thread-id }}
        KIT_NAME: ${{ inputs.kit-name }}
        GITHUB_REPO: ${{ github.repository }}
      working-directory: ${{ github.workspace }}
      run: node ${{ github.action_path }}/scripts/send-discord-release.cjs
